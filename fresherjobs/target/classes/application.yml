server:
  port: ${PORT}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true


  brevo:
    api:
      key: ${BREVO_API_KEY}
      url: ${BREVO_API_URL}
    sender:
      email: ${SENDER_EMAIL}
      name: FresherJobPortal


  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

fronted:
  url: ${FRONTED_URL}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000  # 24 hours in milliseconds

logging:
  level:
    com.fresherjobs: DEBUG
    org.springframework.security: INFO

cloudinary:
  cloud-name: ${CLOUD_NAME}
  api-key: ${API_KEY}
  api-secret: ${API_SECRET}
